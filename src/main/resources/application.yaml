server:
  port: 8080

spring:
  application:
    name: loan-management
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5434/lendingdb
    username: lendinguser
    password: lendingpass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate # Critical: never use 'create' or 'update' with Flyway
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true      # Useful for existing DBs
    baseline-version: 0
    validate-on-migrate: true
    out-of-order: false            # Keep false in production
    clean-disabled: false           # Safety: prevent accidental clean
    table: flyway_schema_history   # Default is fine
    schemas: public
  main: # todo:: can remove if not needed.(circular references should not be allowed)
    allow-circular-references: true

# actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,actuator

jwt:
  secret: fd4a21d975d867cf890f0f21ce6c90370771e2d1934076b26f7e6551086aecc34ee3722d62497e18827354ad3ec955cdb6481b40eb3fb642f0a4464ddead2770
  expiration: 86400   # 24 hours in seconds
